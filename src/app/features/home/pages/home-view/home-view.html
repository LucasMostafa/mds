<section id="hero" class="hero-fullscreen">
  
  <div class="hero-bg">
    <div class="orb orb-1"></div> 
    <div class="orb orb-2"></div> 
    <div class="noise-overlay"></div> 
  </div>

  <div #draggableTag class="floating-tag tag-1">
    <span>/> Angular & TS</span>
  </div>
  <div #draggableTag class="floating-tag tag-2">
    <span>✨ UI/UX Design</span>
  </div>
  <div #draggableTag class="floating-tag tag-3">
    <span>🛒 E-Commerce</span>
  </div>
  <div #draggableTag class="floating-tag tag-4">
    <span>🚀 Escalabilidad</span>
  </div>

  <div class="hero-content">
    <h1>MD<span class="text-studio">STUDIO</span></h1>
    
    <p class="typewriter-container">
      <span class="text">{{ currentText }}</span>
      <span class="cursor">|</span>
    </p>
  </div>

  <div class="scroll-hint">
    <span>DESLIZÁ PARA VER MÁS</span>
    <div class="mouse">
      <div class="wheel"></div>
    </div>
  </div>
</section>

<app-navbar></app-navbar>
<app-what-we-do id="servicios"></app-what-we-do>
<app-studio id="estudio"></app-studio>
<app-bento-grid id="proyectos"></app-bento-grid>
<app-contact id="contacto"></app-contact>
